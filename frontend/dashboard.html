<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body data-page="student-dashboard">
    <div class="app-layout">
      <aside class="sidebar">
        <div>
          <p class="eyebrow">Student Panel</p>
          <h2>SCMS</h2>
        </div>
        <nav>
          <a href="./dashboard.html" class="nav-link active"><span class="nav-icon">&#8962;</span> Dashboard</a>
          <a href="./register.html" class="nav-link"><span class="nav-icon">&#9998;</span> Register Complaint</a>
          <a href="./complaints.html" class="nav-link"><span class="nav-icon">&#128196;</span> All Complaints</a>
          <a href="./history.html" class="nav-link"><span class="nav-icon">&#128337;</span> My History</a>
        </nav>
        <button class="btn btn-secondary" onclick="logout()">Logout</button>
      </aside>

      <main class="content">
        <section class="hero card">
          <p class="eyebrow">Welcome Back</p>
          <h1 id="studentGreeting">Student Dashboard</h1>
          <p>Manage your complaints, check updates, and engage with issues raised by peers.</p>
        </section>

        <section class="grid stats-grid">
          <article class="card stat-card">
            <span class="stat-icon">&#128203;</span>
            <h3>Total Complaints</h3>
            <p id="studentTotalComplaints">0</p>
          </article>
          <article class="card stat-card">
            <span class="stat-icon">&#9203;</span>
            <h3>My Pending</h3>
            <p id="studentPendingComplaints">0</p>
          </article>
          <article class="card stat-card">
            <span class="stat-icon">&#10003;</span>
            <h3>Resolved</h3>
            <p id="studentResolvedComplaints">0</p>
          </article>
        </section>

        <section class="card">
          <div class="section-head">
            <h2>Recent Complaints</h2>
            <a class="text-link" href="./history.html">View full history</a>
          </div>
          <div id="studentRecentComplaints" class="stack-list"></div>
        </section>
      </main>
    </div>

    <script src="../script.js"></script>
  </body>
</html>
