<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Complaints Management</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body data-page="admin-complaints">
    <div class="app-layout">
      <aside class="sidebar admin-sidebar">
        <div>
          <p class="eyebrow">Admin Panel</p>
          <h2>SCMS</h2>
        </div>
        <nav>
          <a href="./admin-dashboard.html" class="nav-link"><span class="nav-icon">&#128200;</span> Dashboard</a>
          <a href="./admin-complaints.html" class="nav-link active"><span class="nav-icon">&#128736;</span> Manage Complaints</a>
        </nav>
        <button class="btn btn-secondary" onclick="logout()">Logout</button>
      </aside>

      <main class="content">
        <section class="card">
          <div class="section-head">
            <div>
              <p class="eyebrow">Review Queue</p>
              <h1>Complaint management</h1>
            </div>
          </div>

          <div class="table-wrap">
            <table class="complaints-table">
              <thead>
                <tr>
                  <th>Complaint ID</th>
                  <th>Category</th>
                  <th>Description</th>
                  <th>Votes</th>
                  <th>Status</th>
                  <th>Remarks</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="adminComplaintsTable"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="../script.js"></script>
  </body>
</html>
